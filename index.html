<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Huerto Hidropónico - Maker Club León</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { display: flex; gap: 30px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); max-width: 900px; width: 100%; flex-wrap: wrap; }
        .controls { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .visualization { flex: 1; min-width: 300px; background: #e0f2f1; border-radius: 12px; padding: 40px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        
        /* Controles */
        .card { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .slider-container { display: flex; flex-direction: column; margin-bottom: 15px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .value-display { font-weight: bold; color: #00796b; float: right; }
        
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background-color: #e0e0e0; transition: all 0.2s; margin-top: 5px; width: 100%; }
        button:hover { background-color: #d5d5d5; }
        button.active { background-color: #4caf50; color: white; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .toggle-btn { background-color: #2196f3; color: white; }
        .toggle-btn:hover { background-color: #1976d2; }

        /* Dibujo del sistema */
        .tower { width: 80px; height: 250px; background: #81c784; border-radius: 10px 10px 0 0; border: 3px solid #388e3c; position: relative; z-index: 2; }
        .tank { width: 180px; height: 100px; background: #4fc3f7; border-radius: 0 0 10px 10px; border: 3px solid #0288d1; border-top: none; position: relative; z-index: 1; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 10px; }
        
        /* Motores y Bombas */
        .motor { width: 45px; height: 45px; background: #9e9e9e; border-radius: 50%; position: absolute; border: 4px solid #616161; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; color: white; text-align: center; transition: background 0.3s; }
        .motor.running { background: #ffeb3b; color: #333; border-color: #fbc02d; animation: spin 1s linear infinite; }
        
        .main-pump { width: 60px; height: 40px; background: #757575; border-radius: 6px; border: 2px solid #424242; color: white; font-size: 10px; display: flex; justify-content: center; align-items: center; transition: background 0.3s; }
        .main-pump.running { background: #4caf50; border-color: #1b5e20; }
        .water-flow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 10px; height: 0; background: rgba(33, 150, 243, 0.7); transition: height 0.3s; z-index: 3; }
        .main-pump.running ~ .water-flow { height: 250px; animation: flowUp 1s infinite; }

        /* Posiciones */
        #mot-abonoA { top: 20px; left: 10px; }
        #mot-abonoB { top: 80px; left: 10px; }
        #mot-phUp { top: 20px; right: 10px; }
        #mot-phDown { top: 80px; right: 10px; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes flowUp { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <h2>Panel de Control - Huerto Hidropónico</h2>

    <div class="dashboard">
        <div class="controls">
            <div class="card">
                <h3>Modo de Operación</h3>
                <button id="btn-mode" class="toggle-btn" onclick="toggleMode()">MODO: MANUAL</button>
            </div>

            <div class="card">
                <h3>Sensores (Simulación)</h3>
                <div class="slider-container">
                    <label>Nivel de pH: <span id="ph-val" class="value-display">7.0</span></label>
                    <input type="range" id="ph-slider" min="0" max="14" step="0.1" value="7.0" oninput="updateSensors()">
                </div>
                <div class="slider-container">
                    <label>Conductividad (EC): <span id="ec-val" class="value-display">1000</span> µS/cm</label>
                    <input type="range" id="ec-slider" min="0" max="3000" step="10" value="1000" oninput="updateSensors()">
                </div>
            </div>

            <div class="card">
                <h3>Actuadores (Control Manual)</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button id="btn-abonoA" onclick="togglePump('abonoA')">Abono A</button>
                    <button id="btn-abonoB" onclick="togglePump('abonoB')">Abono B</button>
                    <button id="btn-phUp" onclick="togglePump('phUp')">pH Up</button>
                    <button id="btn-phDown" onclick="togglePump('phDown')">pH Down</button>
                </div>
                <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
                <button id="btn-main" onclick="toggleMainPump()">Bomba Principal (Relé)</button>
            </div>
        </div>

        <div class="visualization">
            <div id="mot-abonoA" class="motor">Abo A</div>
            <div id="mot-abonoB" class="motor">Abo B</div>
            <div id="mot-phUp" class="motor">pH +</div>
            <div id="mot-phDown" class="motor">pH -</div>

            <div class="tower">
                <div class="water-flow"></div>
            </div>
            <div class="tank">
                <div id="mot-main" class="main-pump">Bomba Sum.</div>
            </div>
        </div>
    </div>

    <script>
        let isAuto = false;
        let pumps = { abonoA: false, abonoB: false, phUp: false, phDown: false };
        let mainPump = false;

        function toggleMode() {
            isAuto = !isAuto;
            const btn = document.getElementById('btn-mode');
            btn.innerText = isAuto ? "MODO: AUTOMÁTICO" : "MODO: MANUAL";
            btn.style.backgroundColor = isAuto ? "#9c27b0" : "#2196f3";
            
            // Deshabilitar botones manuales en modo automático
            const buttons = document.querySelectorAll('.card:nth-child(3) button:not(#btn-main)');
            buttons.forEach(b => b.disabled = isAuto);

            if (isAuto) evaluateLogic();
        }

        function updateSensors() {
            const ph = parseFloat(document.getElementById('ph-slider').value).toFixed(1);
            const ec = document.getElementById('ec-slider').value;
            
            document.getElementById('ph-val').innerText = ph;
            document.getElementById('ec-val').innerText = ec;

            if (isAuto) evaluateLogic();
        }

        function evaluateLogic() {
            const ph = parseFloat(document.getElementById('ph-slider').value);
            const ec = parseInt(document.getElementById('ec-slider').value);

            // Lógica de automatización
            setPumpState('phDown', ph > 7.5);
            setPumpState('phUp', ph < 5.5);
            
            const lowNutrients = ec < 800;
            setPumpState('abonoA', lowNutrients);
            setPumpState('abonoB', lowNutrients);
        }

        function togglePump(pumpId) {
            if (isAuto) return; // Solo funciona en manual
            setPumpState(pumpId, !pumps[pumpId]);
        }

        function setPumpState(pumpId, state) {
            pumps[pumpId] = state;
            const btn = document.getElementById(`btn-${pumpId}`);
            const mot = document.getElementById(`mot-${pumpId}`);
            
            if (state) {
                btn.classList.add('active');
                mot.classList.add('running');
            } else {
                btn.classList.remove('active');
                mot.classList.remove('running');
            }
        }

        function toggleMainPump() {
            mainPump = !mainPump;
            const btn = document.getElementById('btn-main');
            const mot = document.getElementById('mot-main');
            
            if (mainPump) {
                btn.classList.add('active');
                mot.classList.add('running');
            } else {
                btn.classList.remove('active');
                mot.classList.remove('running');
            }
        }
    </script>
</body>
</html>
